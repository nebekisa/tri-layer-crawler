apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: tri-layer-crawler

resources:
  - namespace.yaml
  - configmap.yaml
  - secrets.yaml
  - postgres.yaml
  - redis.yaml
  - api.yaml
  - celery-worker.yaml
  - celery-beat.yaml
  - ingress.yaml

images:
  - name: tri-layer-crawler-api
    newTag: latest
