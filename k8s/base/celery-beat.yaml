apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: tri-layer-crawler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      containers:
        - name: beat
          image: tri-layer-crawler-api:latest
          imagePullPolicy: IfNotPresent
          command: ["celery"]
          args: ["-A", "src.workers", "beat", "--loglevel=info"]
          env:
            - name: DOCKER_ENV
              value: "true"
            - name: CELERY_BROKER_URL
              value: redis://:$(REDIS_PASSWORD)@redis:6379/0
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crawler-secrets
                  key: REDIS_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
