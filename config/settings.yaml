# Tri-Layer Intelligence Crawler - Complete Configuration
# Version: 5.0.0

crawler:
  name: "CerberusCrawler"
  start_urls:
    - "https://books.toscrape.com"
    - "https://quotes.toscrape.com"
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  download_delay: 1.0
  concurrent_requests: 4
  request_timeout: 30
  max_retries: 3
  expansion:
    enabled: true
    max_depth: 3
    max_urls: 100
    same_domain_only: true
    extract_links: true
    respect_nofollow: true
    allowed_extensions: [".html", ".htm", ".php", ""]
    excluded_patterns: ["/login", "/logout", "/cart", "mailto:", "javascript:", "#"]

# DATABASE CONFIGURATION (WAS MISSING!)
database:
  host: "localhost"
  port: 5433
  name: "tri_layer_crawler"
  user: "crawler_user"
  password: "CrawlerPass2024!"
  pool_size: 10
  echo: false

storage:
  csv_output_path: "data/raw/items.csv"
  log_level: "INFO"

api:
  host: "0.0.0.0"
  port: 8000
  reload: true
