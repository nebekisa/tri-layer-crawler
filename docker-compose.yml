version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tri-layer-postgres
    environment:
      POSTGRES_DB: tri_layer_crawler
      POSTGRES_USER: crawler_user
      POSTGRES_PASSWORD: CrawlerPass2024!
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler_user"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tri-layer-network

  api:
    build: .
    container_name: tri-layer-api
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      - DOCKER_ENV=true
      - DATABASE_TYPE=postgresql
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=tri_layer_crawler
      - DATABASE_USER=crawler_user
      - DATABASE_PASSWORD=CrawlerPass2024!
      - JSON_LOGS=false
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    networks:
      - tri-layer-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  crawler:
    build: .
    container_name: tri-layer-crawler
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - DOCKER_ENV=true
      - DATABASE_TYPE=postgresql
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - DATABASE_NAME=tri_layer_crawler
      - DATABASE_USER=crawler_user
      - DATABASE_PASSWORD=CrawlerPass2024!
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    command: python run_concurrent.py
    networks:
      - tri-layer-network

  prometheus:
    image: prom/prometheus:latest
    container_name: tri-layer-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - tri-layer-network

  grafana:
    image: grafana/grafana:latest
    container_name: tri-layer-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - tri-layer-network

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  tri-layer-network:
    driver: bridge