crawler:
  name: "CerberusCrawler"
  start_urls:
    - "https://books.toscrape.com"
    - "https://quotes.toscrape.com"
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  download_delay: 1.0
  concurrent_requests: 4
  request_timeout: 30
  max_retries: 3

deep_crawler:
  enabled: true
  browser_type: "chromium"
  headless: true
  viewport_width: 1920
  viewport_height: 1080
  timeout: 30000
  wait_until: "networkidle"
  max_concurrent_browsers: 2
  screenshot_enabled: true
  screenshot_quality: 85
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36"
  js_enabled: true
  scroll_to_bottom: false
  scroll_pause: 2
  auth:
    enabled: false
    login_url: null
    username: null
    password: null
    cookies_file: "config/cookies.json"

storage:
  csv_output_path: "data/raw/items.csv"
  database_path: "data/tri_layer.db"
  log_level: "INFO"

api:
  host: "0.0.0.0"
  port: 8000
  reload: true

database:
  type: "postgresql"
  host: "postgres"
  port: 5433
  name: "tri_layer_crawler"
  user: "crawler_user"
  password: "CrawlerPass2024!"
  pool_size: 5
  max_overflow: 10
