global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'tri-layer-api'
    static_configs:
      - targets: ['api:8000']
    metrics_path: '/metrics'
    
  - job_name: 'tri-layer-postgres'
    static_configs:
      - targets: ['postgres:9187']
      
  - job_name: 'tri-layer-redis'
    static_configs:
      - targets: ['redis:9121']
