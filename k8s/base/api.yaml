apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: tri-layer-crawler
spec:
  selector:
    app: api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: tri-layer-crawler
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: tri-layer-crawler-api:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DOCKER_ENV
              value: "true"
            - name: DATABASE_HOST
              value: postgres
            - name: DATABASE_PORT
              value: "5432"
            - name: DATABASE_NAME
              value: tri_layer_crawler
            - name: DATABASE_USER
              value: crawler_user
            - name: DATABASE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crawler-secrets
                  key: DATABASE_PASSWORD
            - name: REDIS_HOST
              value: redis
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: crawler-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 8000
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
