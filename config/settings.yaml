# Tri-Layer Intelligence Crawler - Configuration
# Version: 1.0.0
# DO NOT COMMIT SECRETS HERE - Use .env for sensitive data

crawler:
  name: "CerberusCrawler"
  start_urls:
    - "https://books.toscrape.com"
    - "https://quotes.toscrape.com"
  user_agent: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
  download_delay: 1.0
  concurrent_requests: 4  # NEW: Number of parallel requests
  request_timeout: 30      # NEW: Timeout in seconds
  max_retries: 3           # NEW: Max retry attempts

storage:
  csv_output_path: "data/raw/items.csv"
  database_path: "data/tri_layer.db"  # NEW: SQLite database path
  log_level: "INFO"
# NEW: Database configuration
database:
  # Use 'sqlite' for development without PostgreSQL
  # Use 'postgresql' for production
  type: "postgresql"  # Change from 'sqlite' to 'postgresql'
  
  # PostgreSQL settings
  host: "localhost"
  port: 5433
  name: "tri_layer_crawler"
  user: "crawler_user"
  password: "CrawlerPass2024!"
  
  # Connection pool settings
  pool_size: 5
  max_overflow: 10

api:
  host: "0.0.0.0"
  port: 8000
  reload: true  # Development only