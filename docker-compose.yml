services:
  postgres:
    image: postgres:16-alpine
    container_name: tri-layer-postgres
    environment:
      POSTGRES_DB: tri_layer_crawler
      POSTGRES_USER: crawler_user
      POSTGRES_PASSWORD: CrawlerPass2024!
    ports:
      - "5433:5432"  # Map container's 5432 to host's 5433
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crawler_user -d tri_layer_crawler"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - tri-layer-network

  api:
    build: .
    container_name: tri-layer-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_TYPE=postgresql
      - DATABASE_HOST=postgres           # Docker service name
      - DATABASE_PORT=5432               # Internal container port (not 5433)
      - DATABASE_NAME=tri_layer_crawler
      - DATABASE_USER=crawler_user
      - DATABASE_PASSWORD=CrawlerPass2024!
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tri-layer-network
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  crawler:
    build: .
    container_name: tri-layer-crawler
    environment:
      - DATABASE_TYPE=postgresql
      - DATABASE_HOST=postgres           # Docker service name (fixed duplicate)
      - DATABASE_PORT=5432               # Internal container port
      - DATABASE_NAME=tri_layer_crawler
      - DATABASE_USER=crawler_user
      - DATABASE_PASSWORD=CrawlerPass2024!
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tri-layer-network
    command: python run_concurrent.py
    profiles:
      - crawler

networks:
  tri-layer-network:
    driver: bridge

volumes:
  postgres_data: